<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

</header>

<section class="page-banner">

        <img src="images/bridal/bridal2.jpg" alt="bridal">
        <h2>Bridal Makeup</h2>
        <p>Complete bridal transformation package.</p>
        <h3>₹15,000</h3>

    <div class="service-card">
        <img src="images/party/party2.jpg" alt="party">
        <h2>Party Makeup</h2>
        <p>Professional HD makeup for parties.</p>
        <h3>₹5,000</h3>
    </div>

    <div class="service-card">
        <img src="images/portfolio/work2.jpg" alt="shoot">
        <h2>Fashion Shoot</h2>
        <p>Professional styling & fashion makeup.</p>

<footer>
    <p>© 2026 Glow Beauty Studio</p>
</footer>
